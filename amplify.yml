version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build -w apps/web
  artifacts:
    baseDirectory: apps/web/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/web/node_modules/**/*
  customHeaders:
    - pattern: '/index.html'
      headers:
        - key: 'Cache-Control'
          value: 'no-store'
redirects:
  - source: /api/<*>
    target: http://3.15.224.150:4000/api/<*>
    status: '200'
  - source: </^[^.]+$|\.(?!(css|gif|ico|jpg|js|png|txt|svg|woff|ttf|map|json)$)([^.]+$)/>
    target: /index.html
    status: '200'
