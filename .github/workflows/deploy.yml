name: Deploy PediPro Forms - PatientFormsNow

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build API
        run: npm run build -w apps/api

      - name: Package API
        run: |
          mkdir -p deploy-api
          cp -r apps/api/dist deploy-api/
          cp apps/api/package.json deploy-api/package.json
          cd deploy-api
          npm install --omit=dev
          cd ..
          tar -czf pedipro-api.tar.gz -C deploy-api .

      - name: Upload API to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: pedipro-api.tar.gz
          target: /home/ec2-user/

      - name: Deploy API on EC2
        uses: appleboy/ssh-action@v1.0.3
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: JWT_SECRET,FRONTEND_URL,CORS_ORIGIN,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM
          script: |
            sudo mkdir -p /var/app/data /var/app/uploads
            sudo chown -R ec2-user:ec2-user /var/app

            rm -rf /var/app/dist /var/app/package.json /var/app/node_modules

            tar -xzf /home/ec2-user/pedipro-api.tar.gz -C /var/app
            rm -f /home/ec2-user/pedipro-api.tar.gz

            cat > /var/app/.env <<EOF
            PORT=4000
            NODE_ENV=production
            DATA_PATH=/var/app/data
            DB_PATH=/var/app/data/pediform.db
            UPLOAD_DIR=/var/app/uploads
            JWT_SECRET=${JWT_SECRET}
            FRONTEND_URL=${FRONTEND_URL}
            CORS_ORIGIN=${CORS_ORIGIN}
            SMTP_HOST=${SMTP_HOST}
            SMTP_PORT=${SMTP_PORT}
            SMTP_USER=${SMTP_USER}
            SMTP_PASS=${SMTP_PASS}
            EMAIL_FROM=${EMAIL_FROM}
            AWS_REGION=eu-north-1
            S3_BUCKET_NAME=nurturekidsfiles
            EOF

            chmod 600 /var/app/.env

            cd /var/app
            pm2 restart pedipro-api || pm2 start /var/app/dist/index.js --name pedipro-api
            pm2 save

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build patient portal
        working-directory: apps/web
        env:
          VITE_APP_MODE: patient
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          npm run build
          mv dist dist-patient

      - name: Build admin portal
        working-directory: apps/web
        env:
          VITE_APP_MODE: admin
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          npm run build
          mv dist dist-admin

      - name: Package frontend
        run: |
          tar -czf pedipro-frontend.tar.gz -C apps/web dist-patient dist-admin

      - name: Upload frontend to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: pedipro-frontend.tar.gz
          target: /home/ec2-user/

      - name: Deploy frontend on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/patient /var/www/formsadmin
            sudo chown -R ec2-user:ec2-user /var/www/patient /var/www/formsadmin

            rm -rf /home/ec2-user/dist-patient /home/ec2-user/dist-admin

            tar -xzf /home/ec2-user/pedipro-frontend.tar.gz -C /home/ec2-user
            rm -f /home/ec2-user/pedipro-frontend.tar.gz

            rm -rf /var/www/patient/* /var/www/formsadmin/*

            cp -r /home/ec2-user/dist-patient/. /var/www/patient/
            cp -r /home/ec2-user/dist-admin/. /var/www/formsadmin/

            rm -rf /home/ec2-user/dist-patient /home/ec2-user/dist-admin

            sudo nginx -t
            sudo systemctl reload nginx