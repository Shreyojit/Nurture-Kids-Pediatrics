name: Deploy to AWS EC2 — Lone Star Pediatrics

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'e2e/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  # ── Deploy API ────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        working-directory: apps/api
        run: |
          for i in 1 2 3; do npm install --include=dev && break || { echo "npm install attempt $i failed, retrying…"; sleep 15; }; done
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r apps/api/dist deploy/
          jq 'del(.scripts) | del(.devDependencies)' apps/api/package.json > deploy/package.json
          npm install --omit=dev --prefix deploy
          tar -czf lsp-api.tar.gz -C deploy .

      - name: Copy package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: lsp-api.tar.gz
          target: /home/ec2-user/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM,FRONTEND_URL,CORS_ORIGIN,JWT_SECRET
          script: |
            pm2 stop lsp-api || true
            sudo rm -rf /var/app/dist /var/app/node_modules
            sudo mkdir -p /var/app
            sudo chown -R ec2-user:ec2-user /var/app
            tar -xzf /home/ec2-user/lsp-api.tar.gz -C /var/app
            rm /home/ec2-user/lsp-api.tar.gz
            touch /var/app/.env
            for key in SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS EMAIL_FROM FRONTEND_URL CORS_ORIGIN JWT_SECRET; do
              val=$(eval echo \$$key)
              sed -i "/^${key}=/d" /var/app/.env
              echo "${key}=${val}" >> /var/app/.env
            done
            chmod 600 /var/app/.env
            DB_FILE=$(grep -E '^DB_PATH=' /var/app/.env | cut -d= -f2- | tr -d '"' | xargs)
            if [ -z "$DB_FILE" ]; then DB_FILE="/var/app/data/lsp.db"; fi
            if command -v sqlite3 >/dev/null 2>&1 && [ -f "$DB_FILE" ]; then
              sqlite3 "$DB_FILE" "DELETE FROM pdf_template_fields WHERE template_id='3761fe08-1151-4f61-8411-75c78332ca2e'; DELETE FROM field_groups WHERE template_id='3761fe08-1151-4f61-8411-75c78332ca2e';"
              sqlite3 "$DB_FILE" "DELETE FROM pdf_template_fields WHERE template_id='d5dc70ff-7d29-4f74-9aea-c387eec9e6c4'; DELETE FROM field_groups WHERE template_id='d5dc70ff-7d29-4f74-9aea-c387eec9e6c4';"
            fi
            pm2 restart lsp-api || pm2 start /var/app/dist/index.js --name lsp-api
            pm2 save

  # ── Deploy Frontend ───────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build patient site
        working-directory: apps/web
        env:
          VITE_APP_MODE: patient
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          for i in 1 2 3; do npm install && break || { echo "npm install attempt $i failed, retrying…"; sleep 15; }; done
          npm run build
          mv dist dist-patient

      - name: Build admin site
        working-directory: apps/web
        env:
          VITE_APP_MODE: admin
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          npm run build
          mv dist dist-admin

      - name: Package frontend builds
        run: |
          tar -czf frontend.tar.gz -C apps/web dist-patient dist-admin

      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: frontend.tar.gz
          target: /home/ec2-user/

      - name: Extract and configure Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo mkdir -p /var/www/patient /var/www/admin
            sudo chown -R ec2-user:ec2-user /var/www/patient /var/www/admin
            tar -xzf /home/ec2-user/frontend.tar.gz -C /home/ec2-user/
            cp -r /home/ec2-user/dist-patient/. /var/www/patient/
            cp -r /home/ec2-user/dist-admin/. /var/www/admin/
            rm -rf /home/ec2-user/frontend.tar.gz /home/ec2-user/dist-patient /home/ec2-user/dist-admin

            # Patient portal: lonestarpediatrics.com
            sudo tee /etc/nginx/conf.d/patient.conf > /dev/null <<'NGINXEOF'
            server {
              listen 80;
              server_name lonestarpediatrics.com www.lonestarpediatrics.com;
              root /var/www/patient;
              index index.html;
              types {
                application/javascript js mjs;
                text/css css;
                image/svg+xml svg svgz;
                application/json json;
              }
              location / {
                try_files $uri $uri/ /index.html;
              }
            }
            NGINXEOF

            # Admin panel: admin.lonestarpediatrics.com
            sudo tee /etc/nginx/conf.d/admin.conf > /dev/null <<'NGINXEOF'
            server {
              listen 80;
              server_name admin.lonestarpediatrics.com;
              root /var/www/admin;
              index index.html;
              types {
                application/javascript js mjs;
                text/css css;
                image/svg+xml svg svgz;
                application/json json;
              }
              location / {
                try_files $uri $uri/ /index.html;
              }
            }
            NGINXEOF

            # API reverse proxy: api.lonestarpediatrics.com
            sudo tee /etc/nginx/conf.d/api.conf > /dev/null <<'NGINXEOF'
            server {
              listen 80;
              server_name api.lonestarpediatrics.com;
              location / {
                proxy_pass http://127.0.0.1:4000;
                proxy_http_version 1.1;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_pass_header Access-Control-Allow-Origin;
                proxy_pass_header Access-Control-Allow-Credentials;
                proxy_pass_header Access-Control-Allow-Methods;
                proxy_pass_header Access-Control-Allow-Headers;
              }
            }
            NGINXEOF

            sudo nginx -t && sudo systemctl reload nginx
