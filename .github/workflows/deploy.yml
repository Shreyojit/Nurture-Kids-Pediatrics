name: Deploy to AWS EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'e2e/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

jobs:
  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install and build
        working-directory: apps/api
        run: |
          for i in 1 2 3; do npm install --include=dev && break || { echo "npm install attempt $i failed, retrying…"; sleep 15; }; done
          npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r apps/api/dist deploy/
          jq 'del(.scripts) | del(.devDependencies)' apps/api/package.json > deploy/package.json
          npm install --omit=dev --prefix deploy
          tar -czf pediform-api.tar.gz -C deploy .

      - name: Copy package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: pediform-api.tar.gz
          target: /home/ec2-user/

      - name: Extract and restart
        uses: appleboy/ssh-action@v1.0.3
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,EMAIL_FROM,FRONTEND_URL
          script: |
            pm2 stop pediform-api || true
            sudo rm -rf /var/app/dist /var/app/node_modules
            sudo mkdir -p /var/app
            sudo chown -R ec2-user:ec2-user /var/app
            tar -xzf /home/ec2-user/pediform-api.tar.gz -C /var/app
            rm /home/ec2-user/pediform-api.tar.gz
            touch /var/app/.env
            for key in SMTP_HOST SMTP_PORT SMTP_USER SMTP_PASS EMAIL_FROM FRONTEND_URL; do
              val=$(eval echo \$$key)
              sed -i "/^${key}=/d" /var/app/.env
              echo "${key}=${val}" >> /var/app/.env
            done
            chmod 600 /var/app/.env
            # Resolve DB path from .env or fall back to default
            DB_FILE=$(grep -E '^DB_PATH=' /var/app/.env | cut -d= -f2- | tr -d '"' | xargs)
            if [ -z "$DB_FILE" ]; then DB_FILE="/var/app/data/pediform.db"; fi
            # Clear stale fields so the seeder re-populates them with group_id values
            if command -v sqlite3 >/dev/null 2>&1 && [ -f "$DB_FILE" ]; then
              sqlite3 "$DB_FILE" "DELETE FROM pdf_template_fields WHERE template_id='3761fe08-1151-4f61-8411-75c78332ca2e'; DELETE FROM field_groups WHERE template_id='3761fe08-1151-4f61-8411-75c78332ca2e';"
              echo "Cleared stale ASQ 48 fields from $DB_FILE"
              sqlite3 "$DB_FILE" "DELETE FROM pdf_template_fields WHERE template_id='d5dc70ff-7d29-4f74-9aea-c387eec9e6c4'; DELETE FROM field_groups WHERE template_id='d5dc70ff-7d29-4f74-9aea-c387eec9e6c4';"
              echo "Cleared stale ASQ 24 fields from $DB_FILE"
            fi
            pm2 restart pediform-api || pm2 start /var/app/dist/index.js --name pediform-api
            pm2 save

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build patient site
        working-directory: apps/web
        env:
          VITE_APP_MODE: patient
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          for i in 1 2 3; do npm install && break || { echo "npm install attempt $i failed, retrying…"; sleep 15; }; done
          npm run build
          mv dist dist-patient

      - name: Build admin site
        working-directory: apps/web
        env:
          VITE_APP_MODE: admin
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL }}
        run: |
          npm run build
          mv dist dist-admin

      - name: Package frontend builds
        run: |
          tar -czf frontend.tar.gz -C apps/web dist-patient dist-admin

      - name: Copy to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          source: frontend.tar.gz
          target: /home/ec2-user/

      - name: Extract and reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /var/www/patient /var/www/admin
            tar -xzf /home/ec2-user/frontend.tar.gz -C /home/ec2-user/
            cp -r /home/ec2-user/dist-patient/. /var/www/patient/
            cp -r /home/ec2-user/dist-admin/. /var/www/admin/
            rm -rf /home/ec2-user/frontend.tar.gz /home/ec2-user/dist-patient /home/ec2-user/dist-admin
            sudo systemctl reload nginx
